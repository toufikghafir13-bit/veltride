            </div>

            ⚠️ FOR RESEARCH PURPOSES ONLY. NOT FOR HUMAN CONSUMPTION. ≥98% HPLC purity. COA included. Must be 18+.
          </div>
          <a href={WA} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"var(--color-bg-white)",border:"1px solid var(--color-border)",borderRadius:10,textDecoration:"none",marginBottom:100}}>
            <span style={{fontSize:17}}>💬</span>
            <div><div style={{fontSize:11,color:"#2E7D32",fontWeight:600}}>Need help choosing?</div><div style={{fontSize:9,color:"var(--color-text-muted)",marginTop:1}}>WhatsApp · +1 (250) 718-9152</div></div>

                    <span style={{fontSize:19,fontWeight:700,color:"var(--color-text)"}}>${total.toFixed(2)} <span style={{fontSize:10,color:"var(--color-text-muted)",fontWeight:400}}>CAD</span></span>
                  </div>
                  <button onClick={handleCheckout} disabled={checkoutState==="loading"} style={{width:"100%",background:checkoutState==="loading"?"var(--color-bg-light)":"#0057AD",color:checkoutState==="loading"?"#0057AD":"#fff",border:checkoutState==="loading"?"2px solid #0057AD":"none",borderRadius:14,padding:"17px",fontSize:13,fontWeight:700,letterSpacing:"0.1em",display:"flex",alignItems:"center",justifyContent:"center",gap:10,transition:"all 0.2s"}}>
                    {checkoutState==="loading"?<><span style={{display:"inline-block",width:15,height:15,border:"2px solid #E8F3FB",borderTop:"2px solid #0057AD",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}></span>PROCESSING…</>:"CHECKOUT →"}
                  </button>
                  {checkoutState==="error"&&<div style={{marginTop:10,padding:"10px 13px",background:"#FFEBEE",border:"1px solid #EF9A9A",borderRadius:8,fontSize:10,color:"#B71C1C",lineHeight:1.6}}>⚠ {checkoutError}<br/><a href={WA} target="_blank" rel="noopener noreferrer" style={{color:"#25D366",textDecoration:"none"}}>WhatsApp us to order manually →</a></div>}
                  <div style={{textAlign:"center",fontSize:9,color:"var(--color-text-muted)",marginTop:10,letterSpacing:"0.07em"}}>🔒 STRIPE ENCRYPTED · DISCREET SHIPPING · CA ONLY</div>
                </div>
              </>
            }
          </div>
        </div>
      )}
      {!cartOpen&&(
        <a href={WA} target="_blank" rel="noopener noreferrer" title="WhatsApp us" style={{position:"fixed",bottom:22,right:18,zIndex:250,background:"#25D366",borderRadius:"50%",width:52,height:52,display:"flex",alignItems:"center",justifyContent:"center",textDecoration:"none",animation:"waPulse 2.5s ease-in-out infinite"}}>
          <WaIcon size={26}/>
        </a>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
