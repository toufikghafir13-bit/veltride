        <div style={{position:"fixed",inset:0,zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
          <div onClick={()=>setCartOpen(false)} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.8)",backdropFilter:"blur(5px)",WebkitBackdropFilter:"blur(5px)"}}/>
          <div style={{position:"relative",background:"#0a0a14",borderRadius:"20px 20px 0 0",border:"1px solid #1a1a2e",padding:"22px 18px",maxHeight:"82vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div style={{fontSize:14,fontWeight:700,letterSpacing:"0.1em"}}>ORDER SUMMARY</div>
              <button onClick={()=>setCartOpen(false)} style={{background:"#111",border:"none",color:"#888",borderRadius:8,width:32,height:32,fontSize:16}}>×</button>
            </div>
            {cart.length===0
              ?<div style={{textAlign:"center",padding:"40px 0",color:"#333",fontSize:13}}>Cart is empty — pick a goal to start.</div>
              :<>
                {cart.map(item=>(
                  <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #111"}}>
                    <div style={{flex:1,paddingRight:10}}>
                      <div style={{fontSize:12,fontWeight:600}}>{item.name}</div>
                      <div style={{fontSize:9,color:"#555",marginTop:2}}>{item.dose} · ${item.price.toFixed(2)} ea</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <button onClick={()=>updateQty(item.id,-1)} style={{background:"#151520",border:"none",color:"#aaa",width:27,height:27,borderRadius:6,fontSize:15}}>−</button>
                      <span style={{fontSize:13,fontWeight:700,minWidth:20,textAlign:"center"}}>{item.qty}</span>
                      <button onClick={()=>updateQty(item.id,1)} style={{background:"#151520",border:"none",color:"#aaa",width:27,height:27,borderRadius:6,fontSize:15}}>+</button>
                    </div>
                    <div style={{minWidth:60,textAlign:"right",fontSize:13,fontWeight:700}}>${(item.price*item.qty).toFixed(2)}</div>
                  </div>
                ))}
                <div style={{marginTop:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,padding:"12px 0",borderTop:"1px solid #1a1a2e"}}>
                    <span style={{fontSize:11,color:"#888",letterSpacing:"0.08em"}}>SUBTOTAL</span>
                    <span style={{fontSize:19,fontWeight:700}}>${total.toFixed(2)} <span style={{fontSize:10,color:"#444",fontWeight:400}}>CAD</span></span>
                  </div>
                  <button onClick={handleCheckout} disabled={checkoutState==="loading"} style={{width:"100%",background:checkoutState==="loading"?"#0a2a3a":"#00C6FF",color:checkoutState==="loading"?"#00C6FF":"#000",border:checkoutState==="loading"?"1px solid #00C6FF33":"none",borderRadius:14,padding:"17px",fontSize:13,fontWeight:700,letterSpacing:"0.1em",display:"flex",alignItems:"center",justifyContent:"center",gap:10,transition:"all 0.2s"}}>
                    {checkoutState==="loading"?<><span style={{display:"inline-block",width:15,height:15,border:"2px solid #00C6FF44",borderTop:"2px solid #00C6FF",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}></span>PROCESSING…</>:"CHECKOUT →"}
                  </button>
                  {checkoutState==="error"&&<div style={{marginTop:10,padding:"10px 13px",background:"#2a0a0a",border:"1px solid #FF4B2B44",borderRadius:8,fontSize:10,color:"#FF4B2B",lineHeight:1.6}}>⚠ {checkoutError}<br/><a href={WA} target="_blank" rel="noopener noreferrer" style={{color:"#25D366",textDecoration:"none"}}>WhatsApp us to order manually →</a></div>}
                  <div style={{textAlign:"center",fontSize:9,color:"#2a2a3a",marginTop:10,letterSpacing:"0.07em"}}>🔒 STRIPE ENCRYPTED · DISCREET SHIPPING · CA ONLY</div>
                </div>
              </>
            }
          </div>
        </div>
      )}

      {/* FLOATING WA */}
      {!cartOpen&&(
        <a href={WA} target="_blank" rel="noopener noreferrer" title="WhatsApp us" style={{position:"fixed",bottom:22,right:18,zIndex:250,background:"#25D366",borderRadius:"50%",width:52,height:52,display:"flex",alignItems:"center",justifyContent:"center",textDecoration:"none",animation:"waPulse 2.5s ease-in-out infinite"}}>
          <WaIcon size={26}/>
        </a>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
